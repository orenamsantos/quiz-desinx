<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desinx</title>
<meta name="description" content="Descubra por que seu corpo resiste a emagrecer e como inverter isso em 2 minutos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" as="style" onload="this.rel='stylesheet'">

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" media="print" onload="this.media='all'">
<link rel="preload" href="styles.css" as="style" onload="this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="styles.css"></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#0A7B83;--primary-light:#0a7b8318;--accent:#17B8A2;--bg:#FAF8F5;--bg-card:#FFFFFF;--text:#2D2D2D;--text-light:#6B7280;--shadow-sm:0 1px 3px rgba(0,0,0,0.06);--shadow-md:0 4px 16px rgba(0,0,0,0.08);--radius:12px;--radius-lg:16px;--font-body:'DM Sans',system-ui,sans-serif;--font-display:'Playfair Display',Georgia,serif;--transition:all 0.25s cubic-bezier(0.4,0,0.2,1)}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
.quiz-container{max-width:520px;margin:0 auto;padding:20px 16px;min-height:100vh;display:flex;flex-direction:column}
.progress-bar{display:flex;gap:4px;margin-bottom:32px;padding:0 4px;opacity:0;transform:translateY(-10px);transition:var(--transition)}
.progress-bar.visible{opacity:1;transform:translateY(0)}
.progress-phase{flex:1;text-align:center}
.progress-phase-label{font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-light);margin-bottom:6px}
.progress-phase-bar{height:4px;border-radius:4px;background:#E5E7EB}
.progress-phase.active .progress-phase-label{color:var(--primary)}
.progress-phase.active .progress-phase-bar{background:var(--primary)}
#stepsContainer{flex:1}
.step{display:none;flex-direction:column;flex:1}
.step.active{display:flex}
.headline{font-family:var(--font-display);font-size:26px;font-weight:700;line-height:1.25;color:var(--text);margin-bottom:8px;text-align:center}
.subtitle{font-size:15px;color:var(--text-light);line-height:1.6;text-align:center;margin-bottom:28px}
.btn-primary{width:100%;padding:16px;background:var(--primary);color:#fff;font-size:16px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;transition:var(--transition);font-family:var(--font-body)}
.btn-primary:active{transform:scale(0.98)}
.option-card{background:var(--bg-card);border:2px solid #E5E7EB;border-radius:var(--radius);padding:16px;cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:12px;margin-bottom:10px}
.option-card.selected{border-color:var(--primary);background:var(--primary-light)}
.option-icon{font-size:24px;flex-shrink:0}
.option-text{font-size:15px;font-weight:500;line-height:1.4}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg-card);border:1px solid #E5E7EB;border-radius:var(--radius);padding:12px 20px;font-size:13px;box-shadow:var(--shadow-md);z-index:50;transition:transform 0.3s;max-width:90%;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="quiz-container" id="app">
<div class="progress-bar" id="progressBar">
<div class="progress-phase" data-phase="1"><div class="progress-phase-label">Diagnóstico</div><div class="progress-phase-bar"></div></div>
<div class="progress-phase" data-phase="2"><div class="progress-phase-label">Histórico</div><div class="progress-phase-bar"></div></div>
<div class="progress-phase" data-phase="3"><div class="progress-phase-label">Calibração</div><div class="progress-phase-bar"></div></div>
<div class="progress-phase" data-phase="4"><div class="progress-phase-label">Perfil</div><div class="progress-phase-bar"></div></div>
</div>
<div id="stepsContainer"></div>
</div>
<div class="toast" id="toast"></div>
<div class="exit-modal" id="exitModal">
<div class="exit-modal-content">
<button class="exit-close" onclick="closeExitModal()">×</button>
<div class="exit-icon">🎁</div>
<h2 class="exit-title">Você já está na metade da análise.</h2>
<p class="exit-desc">Faltam poucas perguntas pra montar seu protocolo personalizado. Se sair agora, vai precisar <strong>recomeçar do zero</strong>.</p>
<button class="btn-primary" onclick="acceptExitOffer()">Continuar minha análise →</button>
<button class="btn-text" onclick="closeExitModal()">Não, prefiro sair</button>
</div>
</div>
<script defer src="app.js"></script>
